name: Daily Blog Post

on:
  schedule:
    - cron: '30 10 * * *'  # 10:30 UTC = 06:30 Paraguay (UTC-4)
  workflow_dispatch:       # permite ejecución manual desde la UI de GitHub

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate blog post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/generate-post.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          git diff --cached --quiet || git commit -m "blog: auto-post $(date +%Y-%m-%d)"
          git push origin main

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Auto-post falló: ${new Date().toISOString().split('T')[0]}`,
              body: `El workflow **daily-blog** falló en el run [#${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).\n\nRevisar los logs para identificar la causa.`,
              labels: ['bug']
            })
